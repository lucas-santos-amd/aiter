# Smoke test for the DigitalOcean DOKS MI350X self-hosted runners.
# Manual only (workflow_dispatch). Validates the new multi-GPU runner LABELS
# end to end WITHOUT building anything:
#   - linux-aiter-do-mi350x-{1,2,4,8}: the job lands on a DO GPU node and sees
#     EXACTLY <N> GPUs for the -N label (proves the GPU request + bin-packing pack),
#   - the preseeded rocm/pytorch image is local (loaded from the 40TiB scratch cache),
#   - aiter installs + imports from the EXISTING latest-main wheel that aiter-test
#     publishes to S3 (gfx950 = MI350X) — so we exercise the labels with a prebuilt
#     wheel instead of triggering a fresh build_aiter_wheels run.
name: DO runner smoke test
on:
  workflow_dispatch:
    inputs:
      wheel_url:
        description: "Override aiter wheel URL (default: latest gfx942-gfx950 main wheel)"
        required: false
        default: ""

env:
  # Stable "existing wheel" source: the latest-main wheel manifest the aiter-test
  # build step uploads to S3. No build needed — we just install what is already there.
  LATEST_MAIN_MANIFEST: "https://rocm.frameworks-nightlies.amd.com/whl-staging/gfx942-gfx950/main/latest.json"

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-aiter-do-mi350x-1, gpus: 1 }
          - { label: linux-aiter-do-mi350x-2, gpus: 2 }
          - { label: linux-aiter-do-mi350x-4, gpus: 4 }
          - { label: linux-aiter-do-mi350x-8, gpus: 8 }
    runs-on: ${{ matrix.label }}
    steps:
      - name: Runner / node info
        run: |
          set -x
          hostname; nproc; free -g
          ls -la /dev/kfd /dev/dri || true
          echo "GPU device flags from the runner bootstrap:"
          cat /etc/podinfo/gha-render-devices || true

      - name: Preseeded image should already be local (loaded from /mnt/scratch cache)
        run: docker images | grep -i 'rocm/pytorch' || echo "rocm/pytorch not preloaded (will pull)"

      - name: GPU count matches the label (rocm-smi + torch)
        env:
          EXPECT: ${{ matrix.gpus }}
        run: |
          set -euxo pipefail
          GPU_FLAGS="--device /dev/kfd $(cat /etc/podinfo/gha-render-devices)"
          docker run --rm $GPU_FLAGS rocm/pytorch:latest rocm-smi --showproductname
          docker run --rm $GPU_FLAGS -e EXPECT="$EXPECT" rocm/pytorch:latest \
            python -c 'import os, torch; n = torch.cuda.device_count(); exp = int(os.environ["EXPECT"]); print("device_count:", n, "expected:", exp); assert n == exp'

      - name: Resolve the existing aiter wheel (no build)
        id: whl
        env:
          OVERRIDE: ${{ inputs.wheel_url }}
        run: |
          set -euxo pipefail
          if [ -n "$OVERRIDE" ]; then
            URL="$OVERRIDE"
          else
            URL=$(curl -fsSL "$LATEST_MAIN_MANIFEST" \
              | python3 -c 'import sys, json; print(json.load(sys.stdin)["wheel_url"])')
          fi
          echo "wheel_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using existing wheel: $URL"

      - name: Install + import aiter from the existing wheel
        env:
          WHL_URL: ${{ steps.whl.outputs.wheel_url }}
        run: |
          set -euxo pipefail
          GPU_FLAGS="--device /dev/kfd $(cat /etc/podinfo/gha-render-devices)"
          docker run --rm $GPU_FLAGS -e WHL_URL="$WHL_URL" rocm/pytorch:latest \
            sh -c 'pip install --no-cache-dir "$WHL_URL" && python -c "import aiter, torch; print(torch.cuda.device_count())" && echo aiter-import-OK'
